<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personalized Webpage</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ddd;
    }

    .output {
      margin-top: 20px;
    }

    .quote {
      font-size: 14px;
      margin: 5px 0;
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Personalized Page</h2>

    <!-- FORM -->
    <form id="userForm">
      <input type="text" id="name" placeholder="Enter your name" required>
      <input type="number" id="age" placeholder="Enter your age" required>
      <button type="submit">Submit</button>
    </form>

    <!-- OUTPUT -->
    <div class="output">
      <h3 id="greeting"></h3>
      <p id="ageMonths"></p>
      <p id="adultMessage"></p>
      <div id="quotes"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
